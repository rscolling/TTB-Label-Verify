<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * {{ margin: 0; padding: 0; box-sizing: border-box; }}
  html, body {{ background: #777; }}
  #label {{
    width: 1000px;
    background: {paper};
    color: {ink};
    font-family: {body_font};
    padding: 48px 56px;
    position: relative;
  }}
  .frame {{
    border: {frame_border};
    outline: {frame_outline};
    outline-offset: {outline_offset};
    padding: 40px 44px 28px 44px;
  }}
  .topline {{
    text-align: center;
    letter-spacing: 5px;
    font-size: 17px;
    text-transform: uppercase;
    color: {accent};
    margin-bottom: 14px;
  }}
  .band {{
    background: {accent};
    color: {paper};
    text-align: center;
    padding: 20px 10px 16px 10px;
    margin: -40px -44px 26px -44px;
  }}
  .band .brand {{ color: {band_text}; }}
  .brand {{
    font-family: {brand_font};
    font-size: {brand_size};
    font-weight: {brand_weight};
    text-align: center;
    letter-spacing: {brand_spacing};
    line-height: 1.05;
    color: {brand_color};
  }}
  .tagline {{
    text-align: center;
    font-style: italic;
    font-size: 19px;
    margin-top: 10px;
    color: {accent};
  }}
  .rule {{
    border: none;
    border-top: 2px solid {accent};
    width: 46%;
    margin: 20px auto;
  }}
  .rule.thin {{ border-top-width: 1px; width: 62%; }}
  .classtype {{
    text-align: center;
    font-size: 30px;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin: 6px 0 4px 0;
  }}
  .stats {{
    text-align: center;
    font-size: 24px;
    letter-spacing: 2px;
    margin-top: 16px;
  }}
  .stats .sep {{ color: {accent}; padding: 0 12px; }}
  .producer {{
    text-align: center;
    font-size: 16.5px;
    letter-spacing: 1px;
    line-height: 1.55;
    margin-top: 24px;
    text-transform: uppercase;
  }}
  .origin {{
    text-align: center;
    font-size: 18px;
    letter-spacing: 2.5px;
    font-weight: bold;
    text-transform: uppercase;
    margin-top: 14px;
  }}
  .warning {{
    font-family: 'Arial', 'Helvetica', sans-serif;
    font-size: 14.5px;
    line-height: 1.45;
    margin-top: 26px;
    border-top: 1px solid {ink};
    padding-top: 12px;
    text-align: left;
  }}
  .warning b {{ font-weight: 800; }}
  .warning.pre {{ white-space: pre-wrap; }}
  .extras {{
    text-align: center;
    font-size: 15px;
    letter-spacing: 2px;
    margin-top: 14px;
    color: {accent};
    text-transform: uppercase;
  }}
</style>
</head>
<body>
<div id="label">
  <div class="frame">
{content}
  </div>
</div>
</body>
</html>
